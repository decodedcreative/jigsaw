name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build design-system
        run: |
          npm run build --workspace=@jigsaw/theme-default
          npm run build --workspace=@jigsaw/theme-portfolio
          npm run build --workspace=@jigsaw/tokens
          npm run build --workspace=@jigsaw/design-system

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          onlyChanged: true
          exitZeroOnChanges: true
