name: PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  staff-review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run staff-level PR review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REVIEW_PROVIDER: ${{ vars.PR_REVIEW_PROVIDER }}
          PR_REVIEW_MODEL: ${{ vars.PR_REVIEW_MODEL }}
          PR_REVIEW_MAX_FEEDBACK_ROUNDS: ${{ vars.PR_REVIEW_MAX_FEEDBACK_ROUNDS }}
          PR_REVIEW_REPLY_ON_ADDRESS: ${{ vars.PR_REVIEW_REPLY_ON_ADDRESS }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: node .github/scripts/pr-review/review.mjs
