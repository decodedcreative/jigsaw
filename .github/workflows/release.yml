name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_only:
        description: Publish current package versions without opening a Version PR
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # Repo .npmrc only sets legacy-peer-deps; append scope + auth for publish.
      # NODE_AUTH_TOKEN is the env var setup-node and npm read for registry auth.
      - name: Configure npm for @jigsaw-ds
        run: |
          echo "@jigsaw-ds:registry=https://registry.npmjs.org/" >> .npmrc
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Only opens a Version PR when .changeset/*.md files exist; publish runs
      # after that PR is merged (no version bump on push otherwise).
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action reads NPM_TOKEN; npm publish uses .npmrc above.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-only:
    name: Publish current versions
    if: github.event_name == 'workflow_dispatch' && inputs.publish_only
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Configure npm for @jigsaw-ds
        run: |
          echo "@jigsaw-ds:registry=https://registry.npmjs.org/" >> .npmrc
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate and publish
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
