name: Draft GitHub release

on:
  push:
    branches:
      - main
    paths:
      - "packages/**/package.json"
      - "packages/**/CHANGELOG.md"

concurrency:
  group: draft-github-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft:
    name: Draft GitHub release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/github-release-notes.mjs --notes-file release-notes.md --tag-file tag.txt
          TAG=$(cat tag.txt)
          TITLE=$(cat tag.txt)

          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft)
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release $TAG is already published; skipping draft update"
              exit 0
            fi
            echo "Updating draft release $TAG"
            gh release edit "$TAG" --draft --title "$TITLE" --notes-file release-notes.md
          else
            echo "Creating draft release $TAG"
            gh release create "$TAG" --draft --title "$TITLE" --notes-file release-notes.md
          fi
