name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-design-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify no stale @jigsaw/ scope references
        run: |
          if rg --pcre2 '@jigsaw/(?!ds/)' --glob '!.worktrees/**' --glob '!node_modules/**' .; then
            echo 'Found stale @jigsaw/ references — use @jigsaw-ds/ instead.'
            exit 1
          fi

      - name: Test design-system
        run: npm run test --workspace=@jigsaw-ds/design-system

      - name: Test storybook token utilities
        run: |
          npm run build --workspace=@jigsaw-ds/tokens
          npm run test --workspace=@jigsaw-ds/storybook

      - name: Test theme-build and theme CSS packages
        run: |
          npm run test --workspace=@jigsaw-ds/theme-build
          npm run build --workspace=@jigsaw-ds/theme-default
          npm run test --workspace=@jigsaw-ds/theme-default
          npm run build --workspace=@jigsaw-ds/theme-portfolio
          npm run test --workspace=@jigsaw-ds/theme-portfolio

      - name: Verify publishable package exports and tarballs
        run: npm run verify:packages

  test-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build and verify Figma token exports
        run: |
          npm run test --workspace=@jigsaw-ds/tokens
          npm run verify:figma-tokens --workspace=@jigsaw-ds/tokens
          npm run check:figma-drift --workspace=@jigsaw-ds/tokens
